<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── Favicon ── -->
    <!-- Replace /vite.svg with your own icon file once you have one -->
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />

    <!-- ── Primary SEO ── -->
    <!-- This is the blue link title Google shows in search results -->
    <title>La Dolce Vita — Private Residence · Samaná, Dominican Republic</title>
    <!-- This is the 1–2 line description shown under the link in Google -->
    <meta name="description" content="A private residence at La Dolce Vita, Las Terrenas, Samaná. Caribbean views, steps from the beach. Available for weekly stays." />

    <!-- ── Open Graph (Facebook, WhatsApp, iMessage, etc.) ── -->
    <!-- og:title — the bold headline in the share preview card -->
    <meta property="og:title" content="La Dolce Vita — Private Residence · Samaná, Dominican Republic" />
    <!-- og:description — the smaller text under the headline in the card -->
    <meta property="og:description" content="A private residence at La Dolce Vita, Las Terrenas, Samaná. Caribbean views, steps from the beach." />
    <!-- og:type — tells platforms this is a website, not an article or profile -->
    <meta property="og:type" content="website" />
    <!-- og:url — the canonical URL of your site. Update this once you have a custom domain -->
    <meta property="og:url" content="https://rosecore-gyvw.onrender.com" />
    <!-- og:image — the photo that appears in the preview card when someone shares your link.
         Must be an absolute URL. Replace with your best property photo once you have a custom domain.
         Recommended size: 1200×630px -->
    <meta property="og:image" content="https://rosecore-gyvw.onrender.com/og-image.jpg" />
    <meta property="og:image:alt" content="La Dolce Vita private residence, Samaná Dominican Republic" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:site_name" content="La Dolce Vita" />

    <!-- ── Twitter / X Card ── -->
    <!-- Same idea as Open Graph but specifically for Twitter/X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="La Dolce Vita — Private Residence · Samaná, Dominican Republic" />
    <meta name="twitter:description" content="A private residence at La Dolce Vita, Las Terrenas, Samaná. Caribbean views, steps from the beach." />
    <meta name="twitter:image" content="https://rosecore-gyvw.onrender.com/og-image.jpg" />

    <link rel="stylesheet" href="https://use.typekit.net/lle4hoe.css" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
